##############################################################
#  nginx.conf — Proxy inverso + Balanceo de carga + Caché
##############################################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Formato de log con info del upstream ──────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" upstream=$upstream_addr '
                      'cache=$upstream_cache_status';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Zona de caché en disco ────────────────────────────────
    #    levels=1:2        → estructura de subdirectorios
    #    keys_zone         → nombre y tamaño del índice en RAM (10 MB)
    #    max_size          → límite en disco
    #    inactive          → tiempo antes de purgar entradas no usadas
    #    use_temp_path=off → escribe directo al directorio final
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=mi_cache:10m
        max_size=500m
        inactive=60m
        use_temp_path=off;

    # ── Upstream: los 2 nodos Apache ─────────────────────────
    #    least_conn → balanceo por menor número de conexiones activas
    upstream apache_cluster {
        least_conn;
        server apache1:80;
        server apache2:80;
        keepalive 32;
    }

    # ── Servidor virtual ──────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Cabeceras de info de caché (visibles en DevTools)
        add_header X-Cache-Status   $upstream_cache_status always;
        add_header X-Upstream-Node  $upstream_addr         always;
        add_header X-Served-By      "Nginx-LoadBalancer"   always;

        # ── Zona principal: proxy + caché ────────────────────
        location / {
            proxy_pass         http://apache_cluster;
            proxy_http_version 1.1;

            # Cabeceras hacia el upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            # Activar caché
            proxy_cache            mi_cache;
            proxy_cache_valid      200 302  10m;   # cachea respuestas 200/302 durante 10 min
            proxy_cache_valid      404      1m;    # cachea 404 solo 1 min
            proxy_cache_use_stale  error timeout updating
                                   http_500 http_502 http_503 http_504;
            proxy_cache_lock       on;             # evita thundering herd
            proxy_cache_key        "$scheme$host$request_uri";

            # Tiempo de espera
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Endpoint de estado de Nginx ──────────────────────
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.0.0.0/8;   # red interna Docker
            deny  all;
        }
    }
}
